services:
  - type: web
    name: chitragupt
    runtime: python
    plan: free
    buildCommand: pip install -r server/requirements.txt
    startCommand: uvicorn server.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BACKEND_MODE
        value: api
      - key: API_PROVIDER
        value: groq
      - key: API_MODEL
        value: qwen/qwen3.6-27b
      - key: TOOLS_ENABLED
        value: true
      - key: GROQ_API_KEY
        sync: false
